<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Cards</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="flex flex-wrap gap-6">
    <!-- Card 1 -->
    <div class="bg-white shadow-md rounded-lg p-6 flex-1 min-w-[250px]">
      <h3 class="text-xl font-semibold text-gray-800">Mobile First Corp</h3>
      <p class="text-gray-600">React Native Developer</p>
      <p class="text-gray-500">Remote • $130k–$175k</p>
    </div>

    <!-- Card 2 -->
    <div class="bg-white shadow-md rounded-lg p-6 flex-1 min-w-[250px]">
      <h3 class="text-xl font-semibold text-gray-800">WebFlow Agency</h3>
      <p class="text-gray-600">Web Designer & Developer</p>
      <p class="text-gray-500">Los Angeles, CA • $80k–$120k</p>
    </div>

    <!-- Card 3 -->
    <div class="bg-white shadow-md rounded-lg p-6 flex-1 min-w-[250px]">
      <h3 class="text-xl font-semibold text-gray-800">DataViz Solutions</h3>
      <p class="text-gray-600">Data Visualization Specialist</p>
      <p class="text-gray-500">Boston, MA • $125k–$165k</p>
    </div>
  </div>
</body>
</html>
